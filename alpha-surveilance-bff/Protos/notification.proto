syntax = "proto3";

option csharp_namespace = "AlphaSurveilance.Bff.Grpc";

package notification;

// The NotificationService allows Backend Services to push real-time events to the BFF Hub.
service NotificationService {
  rpc PushViolation (ViolationNotificationRequest) returns (ViolationNotificationResponse);
}

message ViolationNotificationRequest {
  string id = 1;
  string tenant_id = 2;
  string type = 3;
  string severity = 4;
  string timestamp = 5;
  string frame_path = 6;
  string camera_id = 7;
  string camera_name = 8;
  string sop_name = 9;
  string violation_type_name = 10;
}

message ViolationNotificationResponse {
  bool acknowledged = 1;
}
