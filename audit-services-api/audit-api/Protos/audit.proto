syntax = "proto3";

option csharp_namespace = "AlphaSurveilance.Audit.Grpc";

package audit;

// The AuditService provides high-performance logging for system events.
// Think of gRPC as a "Digital Contract" - both Services must follow this exactly.
service AuditService {
  // Logs a violation event to the time-series database.
  rpc LogViolation (LogViolationRequest) returns (LogViolationResponse);

  // Retrieves the audit history for a specific violation.
  rpc GetViolationLogs (GetViolationLogsRequest) returns (GetViolationLogsResponse);
}

// Data Flow: Violation Management Service -> LogViolationRequest -> Audit API
// We use proto3 because it is binary and much faster than JSON.
message LogViolationRequest {
  string violation_id = 1;     // Unique ID from the Violation service
  string tenant_id = 2;        // Multi-tenant isolation ID
  string violation_type = 3;   // e.g., "HardHatMissing"
  string timestamp = 4;        // ISO 8601 string
}

message LogViolationResponse {
  bool success = 1;            // Did it save to TimescaleDB?
  string audit_log_id = 2;     // The ID generated by the Audit system
}

message GetViolationLogsRequest {
  string violation_id = 1;
}

message GetViolationLogsResponse {
  repeated AuditLogEntry logs = 1;
}

message AuditLogEntry {
  string audit_id = 1;
  string timestamp = 2;
  string type = 3;
}
