name: Vision Inference Service CI/CD

on:
  push:
    branches: [ main, "feature/*" ]
    paths:
      - 'vision-inference-service/**'
      - '.github/workflows/vision-inference.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'vision-inference-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/vision-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f vision-inference-service/requirements.txt ]; then pip install -r vision-inference-service/requirements.txt; fi
          pip install pytest

      - name: Test
        run: |
          cd vision-inference-service
          pytest

      - name: Extract Version
        id: meta_version
        run: |
          VERSION=$(grep -m 1 'version="' vision-inference-service/main.py | sed 's/.*version="\(.*\)".*/\1/')
          BRANCH=$(echo ${{ github.ref_name }} | sed 's/\//-/g')
          echo "tag=$VERSION-$BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: vision-inference-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta_version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
