name: Surveillance UI CI/CD

on:
  push:
    branches: [ main, "feature/*" ]
    paths:
      - 'surveilance-UI/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'surveilance-UI/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: surveilance-UI/package-lock.json

      - name: Install dependencies
        run: cd surveilance-UI && npm ci

      - name: Build
        run: cd surveilance-UI && npm run build

      # Add test step here if/when tests are added (e.g., npm test)

      - name: Extract Version
        id: meta_version
        run: |
          VERSION=$(node -p "require('./surveilance-UI/package.json').version")
          BRANCH=$(echo ${{ github.ref_name }} | sed 's/\//-/g')
          echo "tag=$VERSION-$BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: surveilance-UI
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta_version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
