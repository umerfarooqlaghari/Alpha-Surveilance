name: Security Static Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - csharp
          - javascript-typescript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

  deepsource:
    name: DeepSource
    runs-on: ubuntu-latest
    if: ${{ secrets.DEEPSOURCE_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install DeepSource CLI
        run: curl -fsSL https://cli.deepsource.com/install | sh

      - name: Authenticate DeepSource CLI
        env:
          DEEPSOURCE_TOKEN: ${{ secrets.DEEPSOURCE_TOKEN }}
        run: |
          "$HOME/.local/bin/deepsource" auth login --with-token "$DEEPSOURCE_TOKEN"

      - name: Wait for DeepSource run for this commit
        env:
          REPO_REF: gh/${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            runs_json=$("$HOME/.local/bin/deepsource" runs --repo "$REPO_REF" --commit "$COMMIT_SHA" --output json || true)

            status=$(echo "$runs_json" | jq -r '
              if type == "array" then
                (.[0].status // empty)
              else
                (.status // .run.status // empty)
              end
            ')

            if [[ -z "$status" || "$status" == "null" ]]; then
              echo "DeepSource run not available yet (attempt $attempt/30)."
              sleep 20
              continue
            fi

            echo "DeepSource status: $status"

            case "$status" in
              success|passed|completed)
                exit 0
                ;;
              failed|error|cancelled)
                echo "DeepSource analysis failed with status: $status"
                exit 1
                ;;
              *)
                sleep 20
                ;;
            esac
          done

          echo "Timed out waiting for DeepSource analysis status for commit $COMMIT_SHA"
          exit 1
